<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #F5F5F5; padding: 16px; font-family: 'DM Mono', monospace; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sample { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 8px; }
  .dark { background: #0A0A0A; }
  .light { background: #F5F5F5; border: 1px solid #D0D0D0; }
  .label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #6B6B6B; margin-top: 4px; }
  .label-on-dark { color: #6B6B6B; }
</style>
</head><body>
<div class="grid">
  <div class="sample dark">
    <img src="../assets/logo-celsux-white.png" style="height:52px; object-fit:contain; filter:none;" alt="Logo white">
    <span class="label label-on-dark">White + Red X — Dark BG</span>
  </div>
  <div class="sample light">
    <img src="../assets/logo-celsux-red.png" style="height:44px; object-fit:contain;" alt="Logo red">
    <span class="label">Red Wordmark — Light BG</span>
  </div>
  <div class="sample light" style="grid-column:1/-1; padding:12px">
    <img src="../assets/logo-celsux-360.png" style="height:60px; object-fit:contain;" alt="Logo 360">
    <span class="label">Full 360 Logo — Light BG only</span>
  </div>
</div>
</body></html>
