<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@700&family=Open+Sans:wght@300&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #0A0A0A; padding: 24px 32px 20px; overflow: hidden; position: relative; }
  .ghost { position: absolute; right: -12px; top: 50%; transform: translateY(-50%); font-family: 'Anton', sans-serif; font-size: 160px; color: transparent; -webkit-text-stroke: 1px #1A1A1A; opacity: 0.05; line-height: 1; user-select: none; letter-spacing: -0.01em; }
  .eyebrow { display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.20em; text-transform: uppercase; color: #E8001D; margin-bottom: 12px; }
  .impact { font-family: 'Anton', sans-serif; font-size: 88px; line-height: 0.88; color: #F5F5F5; letter-spacing: -0.01em; text-transform: uppercase; position: relative; z-index: 2; }
  .impact span { color: #E8001D; }
  .tag { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.20em; text-transform: uppercase; color: #3A3A3A; margin-top: 14px; display: block; position: relative; z-index: 2; }
</style>
</head><body>
<div class="ghost">360</div>
<div style="position:relative;z-index:2">
  <div class="eyebrow"><span style="opacity:0.7;letter-spacing:-0.05em">────</span> Display · Anton</div>
  <div class="impact">PRODUCTORA<br>DE <span>EVENTOS.</span></div>
  <span class="tag">Anton · lh 0.88 · -0.01em · UPPERCASE · min 72px always</span>
</div>
</body></html>
