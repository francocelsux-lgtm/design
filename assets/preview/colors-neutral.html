<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; font-family: 'DM Mono', monospace; }
  .row { display: flex; height: 110px; }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .swatch-name { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .swatch-hex  { font-size: 10px; opacity: 0.7; margin-top: 2px; }
  .label-bar { display: flex; align-items: center; padding: 8px 16px; border-top: 1px solid #eee; }
  .brand-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #6B6B6B; }
</style>
</head><body>
<div class="row">
  <div class="swatch" style="background:#0A0A0A;">
    <span class="swatch-name" style="color:#F5F5F5">Negro</span>
    <span class="swatch-hex" style="color:#F5F5F5">#0A0A0A</span>
  </div>
  <div class="swatch" style="background:#1A1A1A;">
    <span class="swatch-name" style="color:#F5F5F5">Negro Suave</span>
    <span class="swatch-hex" style="color:#F5F5F5">#1A1A1A</span>
  </div>
  <div class="swatch" style="background:#6B6B6B;">
    <span class="swatch-name" style="color:#F5F5F5">Gris Medio</span>
    <span class="swatch-hex" style="color:#F5F5F5">#6B6B6B</span>
  </div>
  <div class="swatch" style="background:#D0D0D0; border-left:1px solid #eee;">
    <span class="swatch-name" style="color:#0A0A0A">Gris Claro</span>
    <span class="swatch-hex" style="color:#0A0A0A">#D0D0D0</span>
  </div>
  <div class="swatch" style="background:#F5F5F5; border-left:1px solid #eee;">
    <span class="swatch-name" style="color:#0A0A0A">Blanco</span>
    <span class="swatch-hex" style="color:#0A0A0A">#F5F5F5</span>
  </div>
</div>
<div class="label-bar">
  <span class="brand-label">Neutral Scale</span>
</div>
</body></html>
