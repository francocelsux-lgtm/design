<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@700&family=Open+Sans:wght@300&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #F5F5F5; padding: 16px 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 5px; }
  .token { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #E8001D; flex: 0 0 80px; }
  .px { font-family: 'DM Mono', monospace; font-size: 8px; color: #6B6B6B; flex: 0 0 60px; }
</style>
</head><body>
<div class="row"><span class="token">--hero</span><span style="font-family:'Anton';font-size:56px;color:#0A0A0A;line-height:1;letter-spacing:-0.01em;text-transform:uppercase">CELSUX</span><span class="px">180px</span></div>
<div class="row"><span class="token">--5xl</span><span style="font-family:'Anton';font-size:44px;color:#0A0A0A;line-height:1;letter-spacing:-0.01em;text-transform:uppercase">CELSUX 360</span><span class="px">128px</span></div>
<div class="row"><span class="token">--4xl</span><span style="font-family:'Anton';font-size:34px;color:#0A0A0A;line-height:0.88;letter-spacing:-0.01em;text-transform:uppercase">ALL-IN-ONE AGENCY</span><span class="px">96px</span></div>
<div class="row"><span class="token">--3xl</span><span style="font-family:'Anton';font-size:26px;color:#0A0A0A;text-transform:uppercase;letter-spacing:-0.01em">Eventos · 25 Años · 3.000</span><span class="px">64px</span></div>
<div class="row"><span class="token">headline</span><span style="font-family:'Oswald';font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:0.02em;color:#0A0A0A">Catálogo de Servicios</span><span class="px">Oswald 700</span></div>
<div class="row"><span class="token">--base</span><span style="font-family:'Open Sans';font-size:13px;font-weight:300;color:#6B6B6B">Productora integral — Buenos Aires, Argentina</span><span class="px">15–17px</span></div>
</body></html>
